<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Calendrier des dispos</title>
<style>
:root{--green:#159447;--red:#d93636;--text:#111;--muted:#666;--line:#d9d9d9;--bg:#f6f6f6;--white:#fff}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif}.wrap{max-width:760px;margin:auto;padding:14px 10px 86px}h1{font-size:26px;margin:6px 0 12px;text-align:center}.panel{background:var(--white);border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:12px}label{font-size:13px;color:var(--muted);display:block;margin-bottom:6px}select{width:100%;font:inherit;font-size:18px;padding:12px;border:1px solid var(--line);border-radius:8px;background:white;color:var(--text)}.actions{position:fixed;left:0;right:0;bottom:0;background:white;border-top:1px solid var(--line);padding:10px 10px calc(10px + env(safe-area-inset-bottom));display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;z-index:10}.actions button{font:inherit;font-weight:700;border-radius:8px;padding:12px 6px;border:2px solid #ccc;background:white;color:#111}.actions button.active[data-status=yes]{border-color:var(--green);background:var(--green);color:white}.actions button.active[data-status=no]{border-color:var(--red);background:var(--red);color:white}.month{background:white;border:1px solid var(--line);border-radius:10px;margin:12px 0;overflow:hidden}.month-title{text-align:center;font-weight:800;font-size:20px;padding:12px;border-bottom:1px solid var(--line)}.weekdays,.days{display:grid;grid-template-columns:repeat(7,1fr)}.weekdays div{text-align:center;padding:8px 2px;font-size:12px;font-weight:700;color:var(--muted);border-bottom:1px solid var(--line)}.day{min-height:74px;background:white;border:0;border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:6px;text-align:left;color:var(--text);position:relative}.day:nth-child(7n){border-right:0}.day.empty{background:#fafafa}.date{font-size:13px;font-weight:700}.count{position:absolute;right:5px;top:5px;font-size:11px;color:var(--muted)}.me-yes{background:#e5f5ea}.me-no{background:#fde7e7}.best{outline:3px solid var(--green);outline-offset:-3px}.mini{position:absolute;left:5px;right:5px;bottom:5px;display:flex;gap:3px;flex-wrap:wrap}.dot{width:15px;height:15px;border-radius:50%;background:var(--green);color:white;font-size:8px;display:grid;place-items:center;font-weight:700}.bad{background:var(--red)}.summary{display:grid;gap:6px}.row{display:flex;justify-content:space-between;gap:8px;border-bottom:1px solid var(--line);padding:8px 0;font-size:14px}.row:last-child{border-bottom:0}.muted{color:var(--muted)}@media(max-width:440px){.wrap{padding:10px 6px 86px}h1{font-size:22px}.panel{padding:10px}.day{min-height:58px;padding:4px}.date{font-size:12px}.count{font-size:10px}.dot{width:12px;height:12px;font-size:7px}.month-title{font-size:18px;padding:10px}.weekdays div{font-size:11px;padding:7px 1px}.actions button{font-size:14px;padding:10px 4px}}
</style>
</head>
<body>
<div class="wrap">
<h1>Calendrier des dispos</h1>
<div class="panel"><label for="person">Participant</label><select id="person"></select></div>
<div class="panel"><strong>Meilleures dates</strong><div id="summary" class="summary"></div></div>
<div id="calendar"></div>
</div>
<div class="actions"><button data-status="yes" class="active">Dispo</button><button data-status="no">Indispo</button><button data-status="clear">Effacer</button></div>
<script>
const PEOPLE=['Armand','Alex','Tanguy','Jerem','Jimi','Brice','Thomas'];
const YEAR=2026,MONTHS=[6,7];
let status='yes';
let current=localStorage.getItem('person')||PEOPLE[0];
let data=JSON.parse(localStorage.getItem('calendar-v4')||'{}');
const person=document.getElementById('person'),calendar=document.getElementById('calendar'),summary=document.getElementById('summary');
PEOPLE.forEach(p=>{const o=document.createElement('option');o.value=p;o.textContent=p;person.appendChild(o)});person.value=current;
person.onchange=()=>{current=person.value;localStorage.setItem('person',current);render()};
document.querySelectorAll('.actions button').forEach(b=>b.onclick=()=>{status=b.dataset.status;document.querySelectorAll('.actions button').forEach(x=>x.classList.remove('active'));b.classList.add('active')});
function pad(n){return String(n).padStart(2,'0')}function key(y,m,d){return y+'-'+pad(m+1)+'-'+pad(d)}function initials(n){return n.slice(0,2).toUpperCase()}function label(k){return new Date(k+'T12:00:00').toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'})}function monthName(m){return new Date(YEAR,m,1).toLocaleDateString('fr-FR',{month:'long',year:'numeric'})}
function build(){calendar.innerHTML='';MONTHS.forEach(m=>{const box=document.createElement('section');box.className='month';box.innerHTML='<div class="month-title">'+monthName(m)+'</div><div class="weekdays"><div>Lun</div><div>Mar</div><div>Mer</div><div>Jeu</div><div>Ven</div><div>Sam</div><div>Dim</div></div><div class="days"></div>';const days=box.querySelector('.days');const first=new Date(YEAR,m,1),last=new Date(YEAR,m+1,0),offset=(first.getDay()+6)%7;for(let i=0;i<offset;i++){const e=document.createElement('div');e.className='day empty';days.appendChild(e)}for(let d=1;d<=last.getDate();d++){const e=document.createElement('button');e.className='day';e.dataset.key=key(YEAR,m,d);e.onclick=()=>setDay(e.dataset.key);days.appendChild(e)}calendar.appendChild(box)});render()}
function setDay(k){data[k] ||= {};if(status==='clear')delete data[k][current];else data[k][current]=status;localStorage.setItem('calendar-v4',JSON.stringify(data));render()}
function render(){const counts={};document.querySelectorAll('.day[data-key]').forEach(e=>{const k=e.dataset.key,d=data[k]||{};const yes=Object.entries(d).filter(x=>x[1]==='yes').map(x=>x[0]);const no=Object.entries(d).filter(x=>x[1]==='no').map(x=>x[0]);counts[k]=yes.length;e.className='day';if(d[current]==='yes')e.classList.add('me-yes');if(d[current]==='no')e.classList.add('me-no');e.innerHTML='<div class="date">'+Number(k.slice(-2))+'</div><div class="count">'+yes.length+'/'+PEOPLE.length+'</div><div class="mini">'+yes.map(n=>'<span class="dot">'+initials(n)+'</span>').join('')+no.map(n=>'<span class="dot bad">'+initials(n)+'</span>').join('')+'</div>'});const max=Math.max(0,...Object.values(counts));document.querySelectorAll('.day[data-key]').forEach(e=>{if(max>0&&counts[e.dataset.key]===max)e.classList.add('best')});const best=Object.entries(counts).filter(x=>x[1]>0).sort((a,b)=>b[1]-a[1]||a[0].localeCompare(b[0])).slice(0,5);summary.innerHTML=best.length?best.map(([k,c])=>'<div class="row"><span>'+label(k)+'</span><strong>'+c+'/'+PEOPLE.length+'</strong></div>').join(''):'<div class="row muted"><span>Aucune date remplie</span></div>'}
build();
</script>
</body>
</html>
