<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Calendrier des dispos</title>
<style>
:root{--green:#159447;--red:#d93636;--text:#111;--muted:#666;--line:#d9d9d9;--bg:#f6f6f6;--white:#fff}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif}.wrap{max-width:760px;margin:auto;padding:12px 8px 20px}h1{font-size:24px;margin:6px 0 10px;text-align:center}.panel{background:var(--white);border:1px solid var(--line);border-radius:8px;padding:10px;margin-bottom:10px}label{font-size:13px;color:var(--muted);display:block;margin-bottom:6px}select{width:100%;font:inherit;font-size:18px;padding:12px;border:1px solid var(--line);border-radius:8px;background:white;color:var(--text)}.month{background:white;border:1px solid var(--line);border-radius:8px;margin:10px 0;overflow:hidden}.month-title{text-align:center;font-weight:800;font-size:19px;padding:10px;border-bottom:1px solid var(--line)}.weekdays,.days{display:grid;grid-template-columns:repeat(7,1fr)}.weekdays div{text-align:center;padding:7px 2px;font-size:12px;font-weight:700;color:var(--muted);border-bottom:1px solid var(--line)}.day{min-height:72px;background:white;border:0;border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:5px;text-align:left;color:var(--text);position:relative}.day:nth-child(7n){border-right:0}.day.empty{background:#fafafa}.date{font-size:13px;font-weight:700}.count{position:absolute;right:5px;top:5px;font-size:11px;color:var(--muted)}.me-yes{background:#dff3e6}.me-no{background:#f9dcdc}.mini{position:absolute;left:5px;right:5px;bottom:5px;display:flex;gap:3px;flex-wrap:wrap}.dot{width:15px;height:15px;border-radius:50%;background:var(--green);color:white;font-size:8px;display:grid;place-items:center;font-weight:700}.bad{background:var(--red)}@media(max-width:440px){.wrap{padding:8px 5px 16px}h1{font-size:21px}.panel{padding:8px}.day{min-height:56px;padding:4px}.date{font-size:12px}.count{font-size:10px}.dot{width:12px;height:12px;font-size:7px}.month-title{font-size:17px;padding:9px}.weekdays div{font-size:11px;padding:6px 1px}}
</style>
</head>
<body>
<div class="wrap">
<h1>Calendrier des dispos</h1>
<div class="panel"><label for="person">Participant</label><select id="person"></select></div>
<div id="calendar"></div>
</div>
<script>
const PEOPLE=['Armand','Alex','Tanguy','Jerem','Jimi','Brice','Thomas'];
const YEAR=2026,MONTHS=[6,7];
let current=localStorage.getItem('person')||PEOPLE[0];
let data=JSON.parse(localStorage.getItem('calendar-v5')||'{}');
const person=document.getElementById('person'),calendar=document.getElementById('calendar');
PEOPLE.forEach(p=>{const o=document.createElement('option');o.value=p;o.textContent=p;person.appendChild(o)});person.value=current;
person.onchange=()=>{current=person.value;localStorage.setItem('person',current);render()};
function pad(n){return String(n).padStart(2,'0')}function key(y,m,d){return y+'-'+pad(m+1)+'-'+pad(d)}function initials(n){return n.slice(0,2).toUpperCase()}function monthName(m){return new Date(YEAR,m,1).toLocaleDateString('fr-FR',{month:'long',year:'numeric'})}
function nextState(value){if(value==='yes')return 'no';if(value==='no')return undefined;return 'yes'}
function build(){calendar.innerHTML='';MONTHS.forEach(m=>{const box=document.createElement('section');box.className='month';box.innerHTML='<div class="month-title">'+monthName(m)+'</div><div class="weekdays"><div>Lun</div><div>Mar</div><div>Mer</div><div>Jeu</div><div>Ven</div><div>Sam</div><div>Dim</div></div><div class="days"></div>';const days=box.querySelector('.days');const first=new Date(YEAR,m,1),last=new Date(YEAR,m+1,0),offset=(first.getDay()+6)%7;for(let i=0;i<offset;i++){const e=document.createElement('div');e.className='day empty';days.appendChild(e)}for(let d=1;d<=last.getDate();d++){const e=document.createElement('button');e.className='day';e.dataset.key=key(YEAR,m,d);e.onclick=()=>cycleDay(e.dataset.key);days.appendChild(e)}calendar.appendChild(box)});render()}
function cycleDay(k){data[k] ||= {};const n=nextState(data[k][current]);if(n) data[k][current]=n; else delete data[k][current];localStorage.setItem('calendar-v5',JSON.stringify(data));render()}
function render(){document.querySelectorAll('.day[data-key]').forEach(e=>{const k=e.dataset.key,d=data[k]||{};const yes=Object.entries(d).filter(x=>x[1]==='yes').map(x=>x[0]);const no=Object.entries(d).filter(x=>x[1]==='no').map(x=>x[0]);e.className='day';if(d[current]==='yes')e.classList.add('me-yes');if(d[current]==='no')e.classList.add('me-no');e.innerHTML='<div class="date">'+Number(k.slice(-2))+'</div><div class="count">'+yes.length+'/'+PEOPLE.length+'</div><div class="mini">'+yes.map(n=>'<span class="dot">'+initials(n)+'</span>').join('')+no.map(n=>'<span class="dot bad">'+initials(n)+'</span>').join('')+'</div>'})}
build();
</script>
</body>
</html>
